# TOOL_REGISTRY.yaml
# Atlas execution authority surface for tools.
# Updated 2026-03-31 after tools/ cleanup (22 deleted, 9 archived).
tools:
  # ── Production fetchers ──────────────────────────────────────────
  - name: fetch_apis
    kind: python_script
    path: tools/fetch_apis.py
    modes: [live]
    network: conditional

  - name: fetch_bettingpros_props
    kind: python_script
    path: tools/fetch_bettingpros_props.py
    modes: [live]
    network: conditional
    writes_surfaces: [input]

  - name: fetch_crafted_player_stats
    kind: python_script
    path: tools/fetch_crafted_player_stats.py
    modes: [live]
    network: conditional

  - name: fetch_nba_defense_stats
    kind: python_script
    path: tools/fetch_nba_defense_stats.py
    modes: [live]
    network: conditional
    writes_surfaces: [input]

  - name: fetch_role_metrics
    kind: python_script
    path: tools/fetch_role_metrics.py
    modes: [live]
    network: conditional

  - name: fetch_rotowire_lines
    kind: python_script
    path: tools/fetch_rotowire_lines.py
    modes: [live]
    network: conditional

  - name: refresh_nba_gamelogs
    kind: python_script
    path: tools/refresh_nba_gamelogs.py
    modes: [live]
    network: conditional

  - name: refresh_iael_today
    kind: python_script
    path: tools/refresh_iael_today.py
    modes: [live]
    network: conditional
    writes_surfaces: [output]

  # ── Production pipeline ──────────────────────────────────────────
  - name: build_share_matrix
    kind: python_script
    path: tools/build_share_matrix.py
    modes: [both]
    network: false

  - name: rebuild_today_from_any_raw
    kind: python_script
    path: tools/rebuild_today_from_any_raw.py
    modes: [both]
    network: false

  - name: publish_latest_placeable
    kind: python_script
    path: tools/publish_latest_placeable.py
    modes: [live]
    network: false

  - name: validate_artifacts
    kind: python_script
    path: tools/validate_artifacts.py
    modes: [both]
    network: false

  # ── Replay / backtest ────────────────────────────────────────────
  - name: replay_bundle
    kind: python_script
    path: tools/replay_bundle.py
    modes: [replay]
    network: false

  - name: replay_scenario
    kind: python_script
    path: tools/replay_scenario.py
    modes: [replay]
    network: false

  - name: create_eval_leg_backtestv2
    kind: python_script
    path: tools/create_eval_leg_backtestv2.py
    modes: [replay]
    network: false

  # ── Telemetry ────────────────────────────────────────────────────
  - name: telemetry_reader
    kind: python_script
    path: tools/telemetry_reader.py
    modes: [both]
    network: false

  - name: telemetry_corpus_reader
    kind: python_script
    path: tools/telemetry_corpus_reader.py
    modes: [both]
    network: false

  - name: telemetry_calibration_diagnostic
    kind: python_script
    path: tools/telemetry_calibration_diagnostic.py
    modes: [both]
    network: false

  # ── Utilities ────────────────────────────────────────────────────
  - name: oracle_tuner
    kind: python_script
    path: tools/oracle_tuner.py
    modes: [both]
    network: false

  - name: financial_multiplier
    kind: python_script
    path: tools/financial_multiplier.py
    modes: [both]
    network: false
