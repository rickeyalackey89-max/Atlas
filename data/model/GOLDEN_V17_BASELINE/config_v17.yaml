telemetry:
  schema_version: 2
  active_calibration: demon_fix
  apply_active_calibration: true
  active_calibration_path: data/model/telemetry_calibration.demon_fix.json
  calibration_policy:
    allow_family_split: true
    family_order:
      - role_off
      - role_on
    strict_source_gating: true
  post_calibration:
    # Disabled: enriched calibrator v3 handles combo-under via is_under/logit_p_x_under features
    combo_under_midq_blend_retain: 1.0
    combo_under_highq_blend_retain: 1.0
    combo_under_lowmidq_blend_retain: 1.0
    combo_under_midq_ra_trim_retain: 1.0
role_ctx:
  enabled: true
  projection_clamp_lo: 0.9
  projection_clamp_hi: 1.11
  projection_softcap_k: 0.9
  variance_k: 0.65
  variance_clamp_lo: 1.0
  variance_clamp_hi: 1.1
  combo_shrink: 0.5
  min_games: 3
  close_sens_mult: 0.35
  # Weight accumulation (from share_matrix_trainer_v1 Phase 2 winner)
  weight_scale: 8.8
  weight_power: 1.2
  accumulation: additive
  max_outs_used: 5
  # Dampening (from role_ctx_trainer_v1 winner)
  star_beneficiary_damp: 0.4
  core_beneficiary_damp: 1.0
  # Tier gating
  demon_tier_damp: 0.0              # DEMON legs: role_ctx off (market-efficient)
  # Direction scaling
  over_direction_damp: 1.0          # no dampening (OVER benefits from role_ctx)
  # Multi-injury boost (from role_ctx_trainer_v1 winner)
  multi_injury_boost: 1.3
  under_relief_q_min: 0.10
  under_relief_haircut_min: 0.05
  under_relief_factor: 0.0
# NOTE: top-level under_relief_* keys removed — kernel reads from role_ctx block only
posthoc_calibrator:
  enabled: true
  coefficients_path: data/model/posthoc_calibrator_coeffs_enriched.json
  ensemble_dir: data/model/ensemble
  mode: replace  # "replace" = GBM output becomes p_cal; "blend" = weighted average with telemetry p_cal
blowout:
  spread_sd: 12.0
  threshold_margin: 15.5
  star_minute_drop: 8.0          # legacy — superseded by blowout_curve
  role_minute_drop: 0.5          # legacy — superseded by blowout_curve
  post_sim_exponent: 0.3
  rate_std_multiplier: 1.0
  matchup_blowout_weight: 0.25
  team_blowout_weight: 0.15
  blowout_curve:
    # Continuous minute-delta = slope × base_min + intercept
    # Empirical fits from gamelog analysis:
    #   win:  slope=-0.2446, intercept=2.41  (crossover  9.9 min)
    #   loss: slope=-0.3206, intercept=5.54  (crossover 17.3 min)
    # Averaged single curve (conservative):
    slope: -0.28
    intercept: 4.0
    crossover: 14.0   # post-sim curve awareness crossover
    max_gain: 5.0      # max minutes a bench player can gain
    max_drop: 12.0     # max minutes a star can lose
  rotation_tiers:
    starter_minute_drop: 3.5     # legacy — kept for reference
    bench_minute_drop: 0.5       # legacy — kept for reference
  asymmetric_blowout:
    enabled: false
    favored_minute_scale: 0.55
    underdog_minute_scale: 1.35
    favored_rate_boost: 0.10
    underdog_rate_penalty: 0.08
  rate_std_multiplier_by_stat:
    PRA: 1.3
    PR: 1.3
    PA: 1.3
    PTS: 1.3
    RA: 1.1
    AST: 1.2
    REB: 1.0
    FG3M: 1.0
  rate_std_under_mult: 2.0     # additional inflation for UNDER legs (pushes toward 0.50)
  rate_min_correlation: 0.35
  thin_window_games: 15
  thin_window_max_mult: 1.6
  recency_halflife: 4
  recency_halflife_by_stat: {}
  recent_form_blend: 0.0
  opp_defense_strength: 1.0
  adjustment_rules:
    - name: combo_scoring_over_high_q_structural_v1
      direction: OVER
      families:
        - combo_scoring
      min_q: 0.35
      starter_like: true
      minute_drop_mult: 0.78
      sensitivity_mult: 0.92
    - name: assists_over_high_q_structural_v1
      direction: OVER
      families:
        - assists
      min_q: 0.35
      minute_drop_mult: 0.76
      sensitivity_mult: 0.88
    - name: threes_over_high_q_structural_v1
      direction: OVER
      families:
        - threes
      min_q: 0.35
      minute_drop_mult: 0.82
      sensitivity_mult: 0.90
    - name: rebounds_over_midq_structural_v1
      direction: OVER
      families:
        - rebounds
      min_q: 0.20
      max_q: 0.30
      minute_drop_mult: 0.90
      sensitivity_mult: 0.94
slip_build:
  max_players_per_team: 2
  no_same_game_within_slip: false
  prefer_calibrated_prob: true
  max_slips_per_player: 5
  target_pool_mult: 200
  phase1_frac: 0.10
  phase1_pool_frac: 0.5
  beam_width: 250
  min_leg_prob: 0.52
  max_leg_prob: 0.0
  require_healthy_data: true
  min_nba_games: 10
  max_same_stat: 2
  # --- New knobs (all OFF by default — trainable) ---
  stat_family_mode: coarse        # "coarse" (5 buckets) or "fine" (per-stat)
  beam_window_growth: 2.0         # multiplier when beam stalls (1.5 = smoother)
  correlation_adj:
    enabled: false
    same_team_penalty: 0.02       # hit_prob discount per same-team same-dir pair
    hedge_bonus: 0.01             # hit_prob bonus per same-team opposite-dir pair
  soft_exposure:
    enabled: false
    threshold: 4                  # quadratic penalty starts above this count
    penalty_per_extra: 0.05       # beam score discount per extra appearance^2
    hard_cap: 6                   # absolute max (still blocked above this)
  penalty:
    team_w: 0.15
    team_power: 2.0
    family_w: 0.10
    family_power: 2.0
    frag_w: 0.0
    frag_power: 1.0
    min_std_w: 0.0
    min_std_ref: 6.0
  by_legs:
    # 3-leg EV: trainer v5 46-date (weighted 3547, 185 wins, 52.4% leg rate)
    "3":
      max_direction_per_slip:
        under: 1
      min_edge: 0.02
      max_same_stat: 2
      min_leg_prob: 0.52
      stat_family_mode: coarse
      beam_window_growth: 2.0
      beam_width: 500
      phase1_frac: 0.3
      target_pool_mult: 500
      penalty:
        team_w: 0.02
        family_w: 0.0
        frag_w: 0.0
    # 4-leg EV: trainer v5 46-date (weighted 3301, 112 wins, 53.1% leg rate)
    "4":
      max_direction_per_slip:
        under: 1
      min_edge: 0.02
      max_same_stat: 3
      stat_family_mode: fine
      beam_window_growth: 1.5
      beam_width: 500
      phase1_frac: 0.2
      target_pool_mult: 600
      penalty:
        team_w: 0.0
        family_w: 0.02
        frag_w: 0.0
    # 5-leg EV: trainer v5 46-date (weighted 3125, 58 wins, 49.4% leg rate)
    "5":
      max_direction_per_slip:
        under: 2
      min_edge: 0.02
      max_same_stat: 2
      stat_family_mode: coarse
      beam_window_growth: 2.0
      penalty:
        team_w: 0.1
        family_w: 0.05
        frag_w: 0.08
  by_sort_mode:
    hit:
      prefer_calibrated_prob: false
      by_legs:
        # 3-leg HIT: slip builder trainer 43-date (79 -> 80 slips, +1%)
        "3":
          min_leg_prob: 0.52
          max_leg_prob: 0.65
          beam_window_growth: 1.5
          stat_family_mode: fine
          min_edge: 0.01
          beam_width: 400
          phase1_frac: 0.10
          target_pool_mult: 350
          penalty:
            team_w: 0.05
            family_w: 0.05
            frag_w: 0.0
        # 4-leg HIT: trainer v5 44-date (baseline 1436 -> 1965, +37% weighted, 149 wins)
        "4":
          exclude_stat_directions: [REB_over, FG3M_over, AST_over]
          max_direction_per_slip:
            under: 2
          min_edge: 0.05
          max_same_stat: 3
          min_leg_prob: 0.52
          stat_family_mode: coarse
          beam_window_growth: 1.5
          beam_width: 300
          phase1_frac: 0.05
          target_pool_mult: 300
          penalty:
            team_w: 0.0
            family_w: 0.0
            frag_w: 0.0
        # 5-leg HIT: trainer v5 44-date (baseline 1583 -> 1770, +12% weighted, 117 wins)
        "5":
          max_direction_per_slip:
            under: 2
          min_edge: 0.04
          max_same_stat: 3
          min_leg_prob: 0.52
          stat_family_mode: coarse
          beam_window_growth: 1.5
          beam_width: 650
          phase1_frac: 0.3
          target_pool_mult: 700
          phase1_pool_frac: 0.75
          penalty:
            team_w: 0.0
            family_w: 0.0
            frag_w: 0.0
optimizer:
  top_n_slips: 10
  top_n_slips_by_legs:
    "3": 10
    "4": 6
    "5": 10
  top_n_slips_by_legs_by_sort_mode:
    hit:
      "3": 10
      "4": 10
      "5": 10
  seed: 7
  external_priors:
    enabled: true
    path: data/input/external_priors_today.csv
    cap: 0.05
    scale: 1.5
    p_floor: 0.02
    p_ceil: 0.98
    sources:
      rotowire: {weight: 1.0}
      bettingpros: {weight: 1.0}
      oddsapi: {weight: 1.0}
