      min_edge: 0.02
      max_same_stat: 2
      min_leg_prob: 0.65
      stat_family_mode: coarse
      beam_window_growth: 2.0
      beam_width: 500
      phase1_frac: 0.3
      target_pool_mult: 500
      penalty:
        team_w: 0.02
        family_w: 0.0
        frag_w: 0.0
    '4':
      max_direction_per_slip:
        under: 1
      min_edge: 0.02
      max_same_stat: 3
      stat_family_mode: fine
      beam_window_growth: 1.5
      beam_width: 500
      phase1_frac: 0.2
      target_pool_mult: 600
      penalty:
        team_w: 0.0
        family_w: 0.02
        frag_w: 0.0
    '5':
      max_direction_per_slip:
        under: 2
      min_edge: 0.02
      max_same_stat: 2
      stat_family_mode: coarse
      beam_window_growth: 2.0
      penalty:
        team_w: 0.1
        family_w: 0.05
        frag_w: 0.08
  by_sort_mode:
    ev:
      by_legs:
        # EV floors raised 2026-05-10 — v5cD is honest, 0.52 legs were earning their dismal hit rate.
        # Cap removed: trust the model, let high-prob legs in. Penalties handle correlation defense.
        '3':
          min_leg_prob: 0.62
          max_leg_prob: 0.0
          beam_window_growth: 1.5
          stat_family_mode: coarse
          beam_width: 150
          phase1_frac: 0.1
          target_pool_mult: 150
          penalty:
            team_w: 0.12
            family_w: 0.1
            frag_w: 0.1
        '4':
          min_leg_prob: 0.62
          max_leg_prob: 0.0
          beam_window_growth: 1.5
          stat_family_mode: fine
          beam_width: 500
          phase1_frac: 0.4
          target_pool_mult: 250
          penalty:
            team_w: 0.05
            family_w: 0.05
            frag_w: 0.03
        '5':
          min_leg_prob: 0.62
          beam_window_growth: 2.0
          stat_family_mode: fine
          beam_width: 650
          phase1_frac: 0.1
          target_pool_mult: 500
          penalty:
            team_w: 0.02
            family_w: 0.0
            frag_w: 0.0
    hit:
      # Use v5cD calibrated probability for winprob boards (2026-05-10) — p_cal beats p_adj.
      prefer_calibrated_prob: true
      by_legs:
        '3':
          min_leg_prob: 0.5
          max_leg_prob: 0.75
          max_players_per_team: 2
          beam_window_growth: 2.0
          stat_family_mode: coarse
          min_edge: 0.01
          beam_width: 300
          phase1_frac: 0.25
