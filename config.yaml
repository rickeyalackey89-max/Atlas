        '4':
          exclude_stat_directions:
          - REB_over
          - FG3M_over
          - AST_over
          max_direction_per_slip:
            under: 2
          max_players_per_team: 2
          min_edge: 0.05
          max_same_stat: 3
          min_leg_prob: 0.5
          max_leg_prob: 0.75
          stat_family_mode: coarse
