marketed_slips:
  enabled: true
  calibration_path: data/model/marketed_calibration.json
  max_players_per_team: 2
  # Single-game slate cap overrides (2026-05-10): when only 1 game is on the board,
  # use per-leg-count caps. 3-leg stays tight at 2 to force cross-team diversification;
  # 4-leg/5-leg relax to 3 since there are only 2 teams to draw from.
  single_game_caps_by_legs:
    3: 2
    4: 3
    5: 3
  excluded_stats:
  - BLK
  - STL
  - TO
  - FTA  # disabled until GBM retrained on playoff data
  # Post-haircut floor DISABLED (2026-05-10) — v5cD CatBoost calibrator is well-calibrated
  # across the full 0.10-0.85 p_cal range, so we trust the model and gate only on raw p_cal.
  min_thresholds:
    GOBLIN: 0.0
    STANDARD: 0.0
    DEMON: 0.0
  # Raw p_cal floor (pre-haircut) — RECALIBRATED 2026-05-10 for v5cD distribution.
  # v5cD shrinks ~70% of legs and spans full 0.10-0.85 range (no isotonic compression).
  # Floors set so each tier exposes enough unique players to fill 12-player marketed pool.
  min_raw_thresholds:
    GOBLIN: 0.68
    STANDARD: 0.55
    DEMON: 0.50
  # GOBLIN/DEMON are structurally OVER-only (PrizePicks shifts the line to manufacture
  # "easy OVER" / "hard OVER"). UNDER on these tiers is invalid and must never reach a slip.
  # The board ingest also raises on UNDER+GOBLIN/DEMON, this is defense-in-depth.
  direction_filters:
    GOBLIN: [OVER]
    DEMON: [OVER]
    STANDARD: [OVER, UNDER]
  # UNDER probability window DISABLED (2026-05-10) — v5cD calibrator is honest about UNDER
  # probabilities. If model says UNDER@0.85, take it. Builder picks best legs PERIOD.
  min_under_prob: 0.0
  max_under_prob: 0.0
  # Recomputed 2026-05-10 against v5cD slip-level eval (10-date corpus, 30 slips).
  # Observed (actual / claimed) ratios: 3L=0.70/0.51=1.37, 4L=0.40/0.30=1.33, 5L=0.20/0.149=1.34.
  # Previous values (1.67/1.33/1.53) were derived against the old overconfident model.
  hit_prob_calibration:
    3: 1.37
    4: 1.33
    5: 1.34

  # high_confidence label fires only when calibrated hit_prob clears a meaningful bar.
  # Raised 2026-05-10 against v5cD corpus — every slip was firing TRUE under old thresholds
  # because v5cD + new multipliers push observed hit rates above the old bars. New bars set
  # to ~observed mean win rate so the label actually filters to genuinely confident slips.
  # 3-leg: 0.65 (observed 70%)  |  4-leg: 0.40 (observed 40%)  |  5-leg: 0.20 (observed 20%)
  high_confidence_thresholds:
    3: 0.65
    4: 0.40
    5: 0.20
  correlation:
    same_team_penalty: 0.03
    hedge_bonus: 0.015
    blowout_penalty: 0.02
  output_name: marketed_slips_latest.json
  publish_to_latest: true
