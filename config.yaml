  active_calibration: playoff_isotonic
  apply_active_calibration: false  # DISABLED for CatBoost corpus build — p_cal = p_for_cal, no isotonic drift
  active_calibration_path: data/model/telemetry_calibration.playoff_isotonic.json
  calibration_policy:
    allow_family_split: true
    family_order:
    - role_off
    - role_on
    strict_source_gating: true
  post_calibration:
    combo_under_midq_blend_retain: 1.0
    combo_under_highq_blend_retain: 1.0
    combo_under_lowmidq_blend_retain: 1.0
    combo_under_midq_ra_trim_retain: 1.0
role_ctx:
  enabled: true
  projection_clamp_lo: 0.9
  projection_clamp_hi: 1.11
  projection_softcap_k: 0.9
  variance_k: 0.65
  variance_clamp_lo: 1.0
  variance_clamp_hi: 1.1
  combo_shrink: 0.5
  min_games: 3
  close_sens_mult: 0.35
  weight_scale: 8.8
  weight_power: 1.2
  accumulation: additive
  max_outs_used: 5
  star_beneficiary_damp: 0.4
  core_beneficiary_damp: 1.0
  demon_tier_damp: 0.0
  over_direction_damp: 1.0
  multi_injury_boost: 1.3
  under_relief_q_min: 0.1
  under_relief_haircut_min: 0.05
  under_relief_factor: 0.0
  # Zero-DNP correction: when a star has 0 DNP games and goes OUT,
  # their backup's minutes expectation is scaled up accordingly.
  zero_dnp_enabled: true
  zero_dnp_dnp_thresh: 2      # out player must have < 2 DNPs to trigger
  zero_dnp_min_cap: 2.5       # max minutes ratio (caps extreme outliers)
  zero_dnp_min_blend: 0.80    # blend factor (1.0 = full ratio, 0.8 = 80% of the gap)
  # Post-GBM blend: prevent GBM from overriding MC signal when zero-DNP fired
  zero_dnp_postcal_blend_thresh: 1.40   # only applies when mult >= this
  zero_dnp_postcal_blend_weight: 0.70   # weight on p_adj (vs GBM p_cal)
  zero_dnp_games_missed_max: 7          # suppress zero-DNP correction after this many consecutive games missed (GBM has learned)
posthoc_calibrator:
  enabled: false  # DISABLED 2026-05-09: GBM degrades playoff Brier (0.2135->0.2398). MC+isotonic is better until playoff GBM retrain at 25+ dates.
  coefficients_path: data/model/posthoc_calibrator_coeffs_enriched.json
  ensemble_dir: data/model/ensemble
  mode: replace

catboost_playoff_calibrator:
  # v5cD residual regressor -- 19 features, iter=600, scale=0.50, clip=0.20
  # LODO clean-6 (excludes 5/01,5/02,5/04,5/06): agg -9.38 mB, worst -4.29 mB, PROMOTE
  enabled: true
  kind: regressor  # "regressor" (v5cD) or "classifier" (legacy v1)
  model_path: data/model/catboost_playoff/catboost_v5cD_full_corpus.cbm
  meta_path: data/model/catboost_playoff/catboost_v5cD_full_corpus.meta.json
  mode: replace  # "replace" writes p_catboost -> p_cal; "blend" uses blend_alpha
  # blend_alpha: 0.5  # only used when mode: blend

# High-probability shrinkage applied to p_adj BEFORE handoff to calibrator/p_for_cal.
# Audit (data/model/kernel_math_audit.json) showed monotone-increasing calibration gap
# for p_adj >= 0.70: -4.06pp at [0.75,0.80) growing to -16.44pp at [0.85,0.90).
# LOSO validation (data/model/high_prob_shrink_loso.json) at p_thr=0.75 produced
# k* = 0.0501, LOSO aggregate -0.22 mB, 0/9 slates regress (worst +0.68 mB).
# Transform: for p > p_thr, p_new = sigmoid(logit(p_thr) + k * (logit(p) - logit(p_thr))).
# k=1.0 = identity; k<1 = shrink toward p_thr.
kernel_high_prob_shrink:
  enabled: true
  p_thr: 0.75
  k: 0.0501

# Blowout-tail bypass: at q_blowout < q_lo OR q_blowout >= q_hi, revert p_adj
# to p_role (skip blowout adjustment). Diagnostic (tools/_blowout_diag.py)
# showed blowout adj hurts +0.58 mB at q<0.15 and +1.98 mB at q>=0.50, but
# wins -17 mB in the [0.20, 0.30) middle. Validated by
# tools/k4_blowout_bypass_loso.py: keep band [0.15, 0.50) yields LOSO -0.36 mB,
# 0/9 slates regress (worst +0.00 mB). 4,321 of 13,186 legs bypass.
kernel_blowout_bypass:
  enabled: true
  q_lo: 0.15
  q_hi: 0.50

# Subset logit shifts applied to p_adj before calibration handoff.
# Each entry: a named subset filter and a single delta (logit-space shift).
# Validated by tools/loso_subset_shift.py — promote only if 0 slates regress >1mB.
# under: direction == UNDER. Audit gap +4.0pp; LOSO delta -0.1651 -> -0.08 mB,
#        0/9 slates regress (worst +0.85). See data/model/loso_subset_shift_under.json.
kernel_subset_shifts:
  - name: under
    enabled: true
    filter:
      direction: UNDER
    delta: -0.1651

# Probability floors per (tier, direction). Applied after high-prob shrink and
# subset shifts, before calibration handoff. Validated by
# tools/k1_goblin_floor_fixed_loso.py — floor=0.40 yields LOSO -8.52 mB,
# 0/9 slates regress (worst +0.14 mB). See data/model/k1_goblin_floor_fixed_loso.json.
# Bias rationale (data/model/k1_goblin_diagnostic.json): GOBLIN OVER q1_low
# quintile shows mean_p=0.163 vs hit=0.501 (+33.85 pp). PrizePicks discounts
# GOBLIN lines below the player's typical clearance threshold.
kernel_prob_floors:
  - name: goblin_over
    enabled: true
    filter:
      tier: GOBLIN
      direction: OVER
    floor: 0.40

# Subset logit shrinks toward 0.5 (variance inflation effect).
# Each entry: a named subset filter and shrink factor k.
# Transform: p_new = sigmoid(k * logit(p))   k=1.0 identity, k<1 shrinks to 0.5.
# Validated by tools/k2_combo_shrink_loso.py — k=0.90 yields LOSO -0.59 mB,
# 0/9 slates regress (worst +0.66 mB). See data/model/k2_combo_shrink_loso.json.
# Bias rationale: combo stats (RA/PA/PRA/PR) show symmetric over-confidence —
# OVER mean_p < 0.5 + hit > mean_p, UNDER mean_p > 0.5 + hit < mean_p — caused
# by under-estimating combo total variance (independent-draw approximation).
kernel_logit_shrinks:
  - name: combo
    enabled: true
    filter:
      stat: [RA, PA, PRA, PR]
    k: 0.90
blowout:
  # Kernel Trainer v2 LOSO Phase 1 winners (2026-05-10): −4.026 mB aggregate,
  # −1.439 mB stacked with 5 promoted layers, 0/9 slates regress > 1.0 mB.
  spread_sd: 11.0
  threshold_margin: 13.0
  star_minute_drop: 8.0
  role_minute_drop: 0.5
  post_sim_exponent: 0.0
  rate_std_multiplier: 1.0
  matchup_blowout_weight: 0.25
  team_blowout_weight: 0.15
  blowout_curve:
    slope: -0.28
    intercept: 4.0
    crossover: 14.0
    max_gain: 5.0
    max_drop: 12.0
  rotation_tiers:
    starter_minute_drop: 3.5
    bench_minute_drop: 0.5
  asymmetric_blowout:
    enabled: false
    favored_minute_scale: 0.55
    underdog_minute_scale: 1.35
    favored_rate_boost: 0.1
    underdog_rate_penalty: 0.08
  rate_std_multiplier_by_stat:
    PRA: 1.105
    PR: 1.105
    PA: 1.105
    PTS: 1.3
    RA: 0.939
    AST: 1.196
    REB: 1.001
    FG3M: 1.001
  rate_std_under_mult: 2.0
  rate_min_correlation: 0.45
  thin_window_games: 20
  thin_window_max_mult: 1.3
  recency_halflife: 4
  recency_halflife_by_stat: {}
  recent_form_blend: 0.0
  opp_defense_strength: 1.0
  # Series opponent multiplier (2026-05-09): amplifies opponent defense signal
  # as the series progresses (teams learn each other's schemes/tendencies).
  # Multiplier applied to (opp_factor - 1.0), so neutral defenses (opp_factor=1.0)
  # are unaffected. Game number inferred from playoff gamelogs.
  # Corrected curve from user: G1=1.01, G2=1.08, G3=1.10, G4+=1.12 (cap).
  series_multiplier:
    enabled: true
    start_date: "2026-04-30"
    multipliers:
      - 1.01   # Game 1 (teams have faced each other 4x in RS)
      - 1.08   # Game 2 (scheme adjustments digested)
      - 1.10   # Game 3
      - 1.12   # Game 4 (cap — max series defender-knowledge effect)
  # Playoff regime correction (2026-05-09)
  # Per-minute rates drop 11-20% in playoffs vs regular season.
  # Elite starters play 5-9 more minutes vs their L20 window mean.
  # Start with enabled: false to preserve existing replay/backtest baselines.
  # Flip to true once validated on a replay slate.
  playoff_regime:
    enabled: false
    start_date: "2026-04-30"
    # Per-stat rate multipliers (data-backed from 9-date playoff corpus)
    rate_penalties:
      PTS: 0.89
      PA: 0.89
      PR: 0.89
      PRA: 0.89
      AST: 0.84
      RA: 0.84
      FG3M: 0.80
      3PM: 0.80
      REB: 0.945
      FTA: 0.91
      BLK: 0.95
      STL: 0.95
      STOCKS: 0.95
    default_rate_penalty: 0.93  # fallback for unmapped stats
    starter_minutes_boost:
      elite_floor: 33.0   # players with mu_close >= 33 get elite boost
      core_floor: 30.0    # players with mu_close >= 30 get core boost
      elite_boost: 6.0    # +6 min for 33+ min players (empirical median)
      core_boost: 3.5     # +3.5 min for 30-33 min players
      boost_cap: 47.0     # never push simulated minutes above 47
  adjustment_rules:
  - name: combo_scoring_over_high_q_structural_v1
    direction: OVER
    families:
    - combo_scoring
    min_q: 0.35
    starter_like: true
    minute_drop_mult: 0.78
    sensitivity_mult: 0.92
  - name: assists_over_high_q_structural_v1
    direction: OVER
    families:
    - assists
    min_q: 0.35
    minute_drop_mult: 0.76
    sensitivity_mult: 0.88
  - name: threes_over_high_q_structural_v1
    direction: OVER
    families:
    - threes
    min_q: 0.35
    minute_drop_mult: 0.82
    sensitivity_mult: 0.9
  - name: rebounds_over_midq_structural_v1
    direction: OVER
    families:
    - rebounds
    min_q: 0.2
    max_q: 0.3
    minute_drop_mult: 0.9
    sensitivity_mult: 0.94
slip_build:
  max_players_per_team: 2
  # Single-game slate cap overrides (2026-05-10): when only 1 game is on the board,
  # use per-leg-count caps. 3-leg stays tight at 2 to force cross-team diversification;
  # 4-leg/5-leg relax to 3 since there are only 2 teams to draw from.
  single_game_caps_by_legs:
    3: 2
    4: 3
    5: 3
  no_same_game_within_slip: false
  prefer_calibrated_prob: true
  max_slips_per_player: 5
  target_pool_mult: 200
  phase1_frac: 0.1
  phase1_pool_frac: 0.5
  beam_width: 250
  min_leg_prob: 0.65
  max_leg_prob: 0.0
  # UNDER cap DISABLED (2026-05-10) — v5cD calibrator is honest about UNDER probabilities.
  # If model says UNDER@0.85, take it. Builders pick best legs PERIOD.
  min_under_prob: 0.0
  max_under_prob: 0.0
  # FTA disabled until GBM retrained on playoff data
  exclude_stat_directions:
  - FTA_over
  - FTA_under
  require_healthy_data: true
  min_nba_games: 10
  max_same_stat: 2
  stat_family_mode: coarse
